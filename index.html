<body>
  <!-- ... your existing HTML ... -->

  <script>
    // ============================================================ //
    // ===== COMPLETE FIXED HINDI TTS ===== //
    // ============================================================ //

    /**
     * Clean text for TTS - Removes ALL non-speech characters
     * Keeps: Hindi (देवनागरी), English, Numbers, Basic Punctuation
     * Removes: Emojis, Special characters (*, #, _, ~, etc.)
     */
    function cleanTextForTTS(text) {
        if (!text) return '';
        
        let clean = text;
        
        // 1. Remove HTML tags
        clean = clean.replace(/<[^>]*>/g, ' ');
        
        // 2. Remove ALL emojis (every possible range)
        const emojiRanges = [
            /[\u{1F600}-\u{1F6FF}]/gu,  // Emoticons
            /[\u{2600}-\u{26FF}]/gu,     // Misc Symbols
            /[\u{2700}-\u{27BF}]/gu,     // Dingbats
            /[\u{1F300}-\u{1F5FF}]/gu,   // Misc Symbols
            /[\u{1F700}-\u{1F77F}]/gu,   // Alchemical
            /[\u{1F780}-\u{1F7FF}]/gu,   // Geometric
            /[\u{1F800}-\u{1F8FF}]/gu,   // Supplemental
            /[\u{1F900}-\u{1F9FF}]/gu,   // Supplemental
            /[\u{1FA00}-\u{1FA6F}]/gu,   // Chess
            /[\u{1FA70}-\u{1FAFF}]/gu,   // Symbols
            /[\u{1F000}-\u{1F02F}]/gu,   // Mahjong
            /[\u{1F030}-\u{1F09F}]/gu,   // Domino
            /[\u{1F0A0}-\u{1F0FF}]/gu,   // Playing cards
            /[\u{1F100}-\u{1F1FF}]/gu,   // Enclosed
            /[\u{1F200}-\u{1F2FF}]/gu,   // Enclosed
            /[\u{1F300}-\u{1F3FF}]/gu,   // Transport
            /[\u{1F400}-\u{1F4FF}]/gu,   // Symbols
            /[\u{1F500}-\u{1F5FF}]/gu,   // Misc
            /[\u{1F600}-\u{1F6FF}]/gu,   // Smileys
            /[\u{1F700}-\u{1F7FF}]/gu,   // Alchemical
            /[\u{1F800}-\u{1F8FF}]/gu,   // Supplemental
            /[\u{1F900}-\u{1F9FF}]/gu    // Supplemental
        ];
        
        for (const range of emojiRanges) {
            clean = clean.replace(range, ' ');
        }
        
        // 3. Remove special characters (*, #, _, ~, `, ^, |, \, /, etc.)
        clean = clean.replace(/[*#_~`^|\\\/<>]/g, ' ');
        
        // 4. Remove extra spaces and trim
        clean = clean.replace(/\s+/g, ' ').trim();
        
        // 5. If empty, return original text without special chars
        if (!clean) {
            // Last resort: just remove emojis and keep everything else
            clean = text.replace(/[\u{1F600}-\u{1F6FF}]/gu, '')
                        .replace(/[*#_~`]/g, ' ')
                        .replace(/\s+/g, ' ')
                        .trim();
        }
        
        return clean;
    }

    /**
     * Speak text using Web Speech API
     * Supports Hindi (hi-IN) with fallback
     */
    function speakText(text) {
        if (!text) {
            console.log('⚠️ No text to speak');
            return;
        }
        
        // Clean text for TTS
        const clean = cleanTextForTTS(text);
        
        if (!clean) {
            console.log('⚠️ No clean text after cleaning');
            return;
        }
        
        console.log('🗣️ Speaking:', clean);
        
        // Cancel any ongoing speech
        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
        }
        
        // Create speech utterance
        const speech = new SpeechSynthesisUtterance(clean);
        speech.lang = "hi-IN";  // Hindi language
        speech.rate = 0.9;      // Slightly slower for clarity
        speech.pitch = 1.0;     // Normal pitch
        speech.volume = 1.0;    // Full volume
        
        // Try to find a good Hindi voice
        let voices = window.speechSynthesis.getVoices();
        
        // If voices not loaded yet, wait for them
        if (voices.length === 0) {
            window.speechSynthesis.onvoiceschanged = () => {
                voices = window.speechSynthesis.getVoices();
                setHindiVoice(speech, voices);
                window.speechSynthesis.speak(speech);
            };
            return;
        }
        
        setHindiVoice(speech, voices);
        window.speechSynthesis.speak(speech);
    }

    /**
     * Set Hindi voice if available, otherwise use default
     */
    function setHindiVoice(speech, voices) {
        // Try to find Google's Hindi voice (best quality)
        let hindiVoice = voices.find(v => 
            v.lang === "hi-IN" && v.name.includes("Google")
        );
        
        // If not found, try any Hindi voice
        if (!hindiVoice) {
            hindiVoice = voices.find(v => v.lang === "hi-IN");
        }
        
        // If still not found, try Hindi (India)
        if (!hindiVoice) {
            hindiVoice = voices.find(v => v.lang.startsWith("hi"));
        }
        
        if (hindiVoice) {
            speech.voice = hindiVoice;
            console.log('🗣️ Using voice:', hindiVoice.name);
        } else {
            console.log('🗣️ Using default voice');
        }
    }

    /**
     * Test TTS function
     */
    function testTTS() {
        const testTexts = [
            "नमस्ते! मैं बिल्कुल ठीक हूँ 😊💬",
            "आपका *स्वागत* है #cscalipur पर",
            "यह है ~सहचर AI~ - आपका साथी 🤖"
        ];
        
        for (const text of testTexts) {
            console.log('Original:', text);
            console.log('Clean:', cleanTextForTTS(text));
            speakText(text);
            // Wait for speech to finish
            setTimeout(() => {}, 2000);
        }
    }

    // Load voices early
    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    }

    // ============================================================ //
    // ===== MODIFIED ADD MESSAGE FUNCTION ===== //
    // ============================================================ //

    // Replace your addMessage function with this:
    function addMessage(text, type, feature = null, imageUrl = null, videoUrl = null) {
        const msg = document.createElement("div");
        msg.className = "sahcharMsg " + (type === "user" ? "sahcharUserMsg" : "sahcharBotMsg");
        
        // Display with emoji (for UI)
        if (imageUrl) {
            const textSpan = document.createElement("span");
            textSpan.innerHTML = text;
            msg.appendChild(textSpan);
            const img = document.createElement("img");
            img.src = imageUrl;
            img.alt = "Generated Image";
            img.loading = "lazy";
            img.onclick = () => window.open(imageUrl, '_blank');
            msg.appendChild(img);
        } else if (videoUrl) {
            const textSpan = document.createElement("span");
            textSpan.innerHTML = text;
            msg.appendChild(textSpan);
            const video = document.createElement("video");
            video.src = videoUrl;
            video.controls = true;
            video.style.maxWidth = "100%";
            video.style.borderRadius = "12px";
            video.style.marginTop = "6px";
            video.style.maxHeight = "200px";
            video.preload = "metadata";
            msg.appendChild(video);
        } else {
            // Display original text with emoji for UI
            msg.innerHTML = text;
        }
        
        if (feature && type === "bot") {
            const tag = document.createElement("span");
            tag.className = "feature-tag";
            tag.textContent = feature;
            msg.appendChild(tag);
        }
        
        messagesDiv.appendChild(msg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        // ✅ Speak ONLY bot messages (clean text, no emoji)
        if (type === "bot" && !imageUrl && !videoUrl) {
            const plainText = text.replace(/<[^>]*>/g, '');
            // Use the fixed speakText function
            speakText(plainText);
        }
    }

    function showTyping(show) {
      typingIndicator.style.display = show ? "flex" : "none";
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // ============================================================ //
    // ===== DETECT FEATURE ===== //
    // ============================================================ //

    function detectFeature(message) {
      const lower = message.toLowerCase();
      if (lower.includes("तस्वीर") || lower.includes("इमेज") || lower.includes("image") || lower.includes("picture")) return "🎨 Image";
      if (lower.includes("वीडियो") || lower.includes("video")) return "🎬 Video";
      if (lower.includes("खोज") || lower.includes("search") || lower.includes("news") || lower.includes("समाचार") || lower.includes("मौसम")) return "🔍 Search";
      if (lower.includes("document") || lower.includes("दस्तावेज़") || lower.includes("फाइल")) return "📄 Document";
      if (lower.includes("पिछली बात") || lower.includes("history") || lower.includes("याद")) return "💾 Memory";
      if (lower.includes("समय") || lower.includes("time") || lower.includes("तारीख") || lower.includes("date")) return "⏰ Time";
      return "💬 Chat";
    }

    // ============================================================ //
    // ===== SEND MESSAGE ===== //
    // ============================================================ //

    function sendMessage() {
      const msg = inputField.value.trim();
      if (!msg) return;

      const feature = detectFeature(msg);
      addMessage(msg, "user");
      inputField.value = "";
      showTyping(true);

      const cleanMsg = cleanTextForAPI(msg);
      if (!cleanMsg) {
        showTyping(false);
        addMessage("⚠️ कृपया टेक्स्ट लिखें।", "bot");
        return;
      }

      // ===== Image Generation =====
      if (feature === "🎨 Image") {
        let prompt = cleanMsg.replace(/तस्वीर\s*(बनाओ|दो|दिखाओ)/gi, '').replace(/इमेज\s*(बनाओ|दो|दिखाओ)/gi, '').replace(/image|picture|draw/gi, '').trim();
        if (!prompt) prompt = cleanMsg;
        generateImage(prompt);
        return;
      }

      // ===== Video Generation =====
      if (feature === "🎬 Video") {
        let prompt = cleanMsg.replace(/वीडियो\s*(बनाओ|दो|दिखाओ)/gi, '').replace(/video/gi, '').trim();
        if (!prompt) prompt = cleanMsg;
        generateVideo(prompt);
        return;
      }

      // ===== Normal Chat =====
      fetch(`${API_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({ message: cleanMsg, sessionId: "web_user_" + Date.now() })
      })
      .then(res => res.json())
      .then(data => {
        showTyping(false);
        const reply = data.reply || data.message || "क्षमा करें, उत्तर नहीं मिला। 🙏";
        addMessage(reply, "bot", feature);
      })
      .catch(err => {
        showTyping(false);
        addMessage("सर्वर से संपर्क नहीं हो पाया। 🙏", "bot");
        console.error("Chat error:", err);
      });
    }

    // ============================================================ //
    // ===== IMAGE GENERATION ===== //
    // ============================================================ //

    function generateImage(prompt) {
      showTyping(true);
      addMessage("🎨 इमेज जनरेट हो रही है...", "bot", "🎨 Image");

      const cleanPrompt = cleanTextForAPI(prompt);

      fetch(`${API_URL}/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
          prompt: cleanPrompt,
          sessionId: "web_user_" + Date.now()
        })
      })
      .then(res => res.json())
      .then(data => {
        showTyping(false);
        const msgs = messagesDiv.querySelectorAll('.sahcharMsg');
        if (msgs.length > 0 && msgs[msgs.length-1].innerText.includes('जनरेट हो रही है')) {
          msgs[msgs.length-1].remove();
        }
        
        const imageUrl = data.imageUrl || data.url;
        if (imageUrl) {
          addMessage("✅ ये रही आपकी तस्वीर:", "bot", "🎨 Image", imageUrl);
          speakText("ये रही आपकी तस्वीर");
        } else {
          addMessage("❌ इमेज जनरेट नहीं हो पाई। कृपया पुनः प्रयास करें।", "bot", "🎨 Image");
        }
      })
      .catch(err => {
        showTyping(false);
        const msgs = messagesDiv.querySelectorAll('.sahcharMsg');
        if (msgs.length > 0 && msgs[msgs.length-1].innerText.includes('जनरेट हो रही है')) {
          msgs[msgs.length-1].remove();
        }
        addMessage("❌ इमेज जनरेट करने में त्रुटि हुई।", "bot", "🎨 Image");
        console.error("Image gen error:", err);
      });
    }

    // ============================================================ //
    // ===== VIDEO GENERATION ===== //
    // ============================================================ //

    function generateVideo(prompt) {
      showTyping(true);
      addMessage("🎬 वीडियो जनरेट हो रहा है...", "bot", "🎬 Video");

      const cleanPrompt = cleanTextForAPI(prompt);

      fetch(`${API_URL}/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
          prompt: cleanPrompt,
          model: "video",
          sessionId: "web_user_" + Date.now()
        })
      })
      .then(res => res.json())
      .then(data => {
        showTyping(false);
        const msgs = messagesDiv.querySelectorAll('.sahcharMsg');
        if (msgs.length > 0 && msgs[msgs.length-1].innerText.includes('जनरेट हो रहा है')) {
          msgs[msgs.length-1].remove();
        }
        
        const videoUrl = data.videoUrl;
        if (videoUrl) {
          addMessage("✅ ये रहा आपका वीडियो:", "bot", "🎬 Video", null, videoUrl);
          speakText("ये रहा आपका वीडियो");
        } else {
          addMessage("❌ वीडियो जनरेट नहीं हो पाया। कृपया पुनः प्रयास करें।", "bot", "🎬 Video");
        }
      })
      .catch(err => {
        showTyping(false);
        const msgs = messagesDiv.querySelectorAll('.sahcharMsg');
        if (msgs.length > 0 && msgs[msgs.length-1].innerText.includes('जनरेट हो रहा है')) {
          msgs[msgs.length-1].remove();
        }
        addMessage("❌ वीडियो जनरेट करने में त्रुटि हुई।", "bot", "🎬 Video");
        console.error("Video gen error:", err);
      });
    }

    inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

    // ============================================================ //
    // ===== VOICE INPUT ===== //
    // ============================================================ //

    function startVoiceInput() {
      if (!('webkitSpeechRecognition' in window)) { addMessage("⚠️ Chrome या Edge इस्तेमाल करें।", "bot"); return; }
      
      const micBtn = document.getElementById("micBtn");
      micBtn.classList.add("listening");
      
      const recognition = new webkitSpeechRecognition();
      recognition.lang = "hi-IN";
      recognition.interimResults = false;
      recognition.continuous = false;
      
      recognition.onstart = () => {
        addMessage("🎤 सुन रहा हूँ...", "bot");
      };
      
      recognition.onresult = (e) => {
        const voiceText = e.results[0][0].transcript;
        inputField.value = voiceText;
        micBtn.classList.remove("listening");
        recognition.stop();
        sendMessage();
      };
      
      recognition.onerror = () => {
        micBtn.classList.remove("listening");
        addMessage("⚠️ आवाज नहीं पहचानी गई। कृपया पुनः प्रयास करें।", "bot");
      };
      
      recognition.start();
    }

    // ============================================================ //
    // ===== FEATURE MODAL ===== //
    // ============================================================ //

    function openFeatureModal() {
      document.getElementById("featureModal").style.display = "flex";
      document.getElementById("featurePromptArea").classList.remove("active");
      selectedFeature = null;
    }

    function closeFeatureModal() {
      document.getElementById("featureModal").style.display = "none";
    }

    function closeFeatureModalOutside(e) {
      if (e.target === e.currentTarget) closeFeatureModal();
    }

    function selectFeature(icon, label, prompt) {
      selectedFeature = { icon, label, prompt };
      document.getElementById("featurePromptLabel").innerHTML = `${icon} ${label}: अपना प्रश्न लिखें`;
      document.getElementById("featurePromptInput").placeholder = `जैसे: ${prompt}`;
      document.getElementById("selectedFeatureName").textContent = label;
      document.getElementById("featurePromptArea").classList.add("active");
      document.getElementById("featurePromptInput").focus();
    }

    function sendFeaturePrompt() {
      const input = document.getElementById("featurePromptInput");
      const prompt = input.value.trim();
      if (!prompt || !selectedFeature) return;
      closeFeatureModal();
      
      if (selectedFeature.label === "Image Gen") {
        inputField.value = `तस्वीर बनाओ ${prompt}`;
      } else if (selectedFeature.label === "Video Gen") {
        inputField.value = `वीडियो बनाओ ${prompt}`;
      } else {
        inputField.value = prompt;
      }
      sendMessage();
      input.value = "";
    }

    document.getElementById("featurePromptInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") sendFeaturePrompt();
    });

    // ============================================================ //
    // ===== EXISTING SCRIPT (CSC Functionality) ===== //
    // ============================================================ //

    document.getElementById('currentYear').textContent = new Date().getFullYear();

    function updateVisitorCounter() {
      const countSpan = document.getElementById('visitorCount');
      if (!sessionStorage.getItem('visitorCounted')) {
        let count = localStorage.getItem('visitorCount');
        count = count ? parseInt(count) + 1 : 1;
        localStorage.setItem('visitorCount', count);
        sessionStorage.setItem('visitorCounted', 'true');
        countSpan.innerText = count;
      } else {
        countSpan.innerText = localStorage.getItem('visitorCount') || 1;
      }
    }
    updateVisitorCounter();

    document.getElementById('serviceSearch').addEventListener('keyup', function() {
      let search = this.value.toLowerCase();
      document.querySelectorAll('.card').forEach(card => {
        let title = card.querySelector('h3').innerText.toLowerCase();
        let desc = card.querySelector('p').innerText.toLowerCase();
        card.style.display = (title.includes(search) || desc.includes(search) || search === '') ? 'flex' : 'none';
      });
    });

    function generateToken() {
      const now = new Date();
      const dateStr = now.getFullYear().toString().slice(-2) +
                      (now.getMonth()+1).toString().padStart(2,'0') +
                      now.getDate().toString().padStart(2,'0');
      const random = Math.floor(Math.random() * 10000).toString().padStart(4,'0');
      return `CSC${dateStr}${random}`;
    }

    document.getElementById('appointmentForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.querySelector('input[name="entry.107361189"]').value.trim();
      const mobile = document.querySelector('input[name="entry.1364756197"]').value.trim();
      const service = document.querySelector('select[name="entry.957456591"]').value;
      const date = document.querySelector('input[name="entry.1788454306"]').value;
      if (!name || !mobile || !service || !date) { showError('कृपया सभी फील्ड भरें'); return; }
      if (mobile.length !== 10 || isNaN(mobile)) { showError('10 अंकों का नंबर डालें'); return; }
      const token = generateToken();
      document.getElementById('tokenInput').value = token;
      document.getElementById('tokenDisplay').innerText = token;
      document.getElementById('appointmentForm').style.display = 'none';
      document.getElementById('loadingDiv').style.display = 'block';
      document.getElementById('errorMessage').style.display = 'none';
      const formData = new FormData(document.getElementById('appointmentForm'));
      fetch(document.getElementById('appointmentForm').action, { method: 'POST', body: formData, mode: 'no-cors' })
      .then(() => {
        document.getElementById('loadingDiv').style.display = 'none';
        document.getElementById('thankYouMessage').style.display = 'block';
        document.getElementById('thankYouMessage').scrollIntoView({ behavior: 'smooth' });
      })
      .catch(() => {
        document.getElementById('loadingDiv').style.display = 'none';
        document.getElementById('appointmentForm').style.display = 'block';
        showError('डेटा भेजने में समस्या हुई।');
      });
    });

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.innerText = message;
      errorDiv.style.display = 'block';
      errorDiv.scrollIntoView({ behavior: 'smooth' });
      setTimeout(() => errorDiv.style.display = 'none', 5000);
    }

    function resetForm() {
      document.getElementById('appointmentForm').reset();
      document.getElementById('appointmentForm').style.display = 'block';
      document.getElementById('thankYouMessage').style.display = 'none';
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('appointmentForm').scrollIntoView({ behavior: 'smooth' });
    }

    const today = new Date();
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    const maxDate = new Date(today);
    maxDate.setDate(maxDate.getDate() + 30);
    const dateInput = document.querySelector('input[name="entry.1788454306"]');
    dateInput.min = tomorrow.toISOString().split('T')[0];
    dateInput.max = maxDate.toISOString().split('T')[0];
  </script>
</body>
</html>
